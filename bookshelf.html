---
layout: page
title: bookshelf
---

<div class="content">
<a href="/" class="back-btn">back</a>

<h1 style="font-weight: normal; font-size: 1.2rem;">{{ page.title }}</h1>
{% if site.bookshelf.size > 0 %}
  <ul>
    {% for book in site.bookshelf %}
      <li><a href="{{ book.url | relative_url }}">{{ book.title }}</a></li>
    {% endfor %}
  </ul>
{% else %}
  <p>loading...</p>
{% endif %}
</div>
